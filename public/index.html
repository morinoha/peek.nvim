<!DOCTYPE html>
<html lang="en">

<head>
  <title>Peek preview</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="github-markdown.min.css" rel="stylesheet" />
  <link href="katex.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>

<body class="peek-body" data-theme="dark">
  <base id="peek-base" />
  <main id="peek-markdown-body" class="markdown-body">
    <div class="peek-loader"></div>
  </main>
  <div id="peek-zoom-label"></div>
  <div id="peek-mermaid-modal" class="peek-mermaid-modal hidden">
    <div class="peek-mermaid-modal-overlay"></div>
    <div class="peek-mermaid-modal-content">
      <button class="peek-mermaid-modal-close">&times;</button>
      <div class="peek-mermaid-modal-container"></div>
    </div>
  </div>
  <!-- Print Toolbar -->
  <div id="peek-print-toolbar" style="
    position: fixed; top: 10px; right: 10px; z-index: 10000;
    display: flex; gap: 6px; opacity: 0.3; transition: opacity 0.2s;
  " onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.3'">
    <select id="peek-print-mode" style="
      padding: 4px 8px; border-radius: 4px; border: 1px solid #555;
      background: #2d2d2d; color: #ccc; font-size: 12px; cursor: pointer;
    ">
      <option value="a4">A4 横</option>
      <option value="a4-portrait">A4 縦</option>
      <option value="digital" selected>デジタル共有</option>
    </select>
    <button id="peek-print-btn" style="
      padding: 4px 12px; border-radius: 4px; border: 1px solid #555;
      background: #2d2d2d; color: #ccc; font-size: 12px; cursor: pointer;
    ">印刷</button>
  </div>

  <script>
  (function() {
    let printStyleEl = null;

    async function updatePrintStyle(mode) {
      if (printStyleEl) printStyleEl.remove();
      printStyleEl = document.createElement('style');

      let pageSize;
      if (mode === 'digital') {
        // 印刷幅(210mm - margin 30mm = 180mm ≒ 680px)でのコンテンツ高さを計測
        const iframe = document.createElement('iframe');
        iframe.style.cssText = 'position:fixed;left:-9999px;width:680px;height:0;border:none;visibility:hidden;';
        document.body.appendChild(iframe);
        const doc = iframe.contentDocument;
        // スタイルシートをコピー
        Array.from(document.styleSheets).forEach(function(sheet) {
          try {
            if (sheet.href) {
              const link = doc.createElement('link');
              link.rel = 'stylesheet';
              link.href = sheet.href;
              doc.head.appendChild(link);
            }
          } catch(e) {}
        });
        const container = doc.createElement('div');
        container.className = 'markdown-body';
        container.style.cssText = 'padding:0;margin:0;max-width:none;';
        container.innerHTML = document.getElementById('peek-markdown-body').innerHTML;
        doc.body.appendChild(container);
        // レンダリング待ち
        await new Promise(function(r) { setTimeout(r, 100); });
        const heightMm = Math.ceil(doc.body.scrollHeight * 0.265) + 40;
        document.body.removeChild(iframe);
        pageSize = '210mm ' + heightMm + 'mm';
      } else if (mode === 'a4-portrait') {
        pageSize = 'A4 portrait';
      } else {
        pageSize = 'A4 landscape';
      }

      printStyleEl.textContent = `@media print { @page { size: ${pageSize}; margin: 15mm; } }`;
      document.head.appendChild(printStyleEl);
    }

    document.getElementById('peek-print-mode').addEventListener('change', function() {
      updatePrintStyle(this.value);
    });

    document.getElementById('peek-print-btn').addEventListener('click', async function() {
      await updatePrintStyle(document.getElementById('peek-print-mode').value);
      setTimeout(function() { window.print(); }, 100);
    });

    // 初期値
    updatePrintStyle('digital');
  })();
  </script>

  <script src="mermaid.min.js"></script>
  <script src="svg-pan-zoom.min.js"></script>
  <script src="script.bundle.js"></script>
</body>

</html>
